<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" fill="none">
  <!-- back cover / spine shadow -->
  <rect x="13" y="9" width="40" height="46" rx="5" fill="#5b1fd1"/>
  <!-- front cover -->
  <rect x="10" y="7" width="40" height="46" rx="5" fill="#863bff"/>
  <!-- spine highlight -->
  <rect x="10" y="7" width="7" height="46" rx="3" fill="#9d5cff"/>
  <!-- pages peeking out -->
  <rect x="46" y="11" width="6" height="38" rx="2" fill="#f3eeff"/>
  <!-- candle/uptrend chart on the cover -->
  <g stroke="#ffffff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <polyline points="20,40 27,34 33,37 41,24"/>
  </g>
  <circle cx="41" cy="24" r="2.6" fill="#47bfff"/>
  <!-- title bar -->
  <rect x="19" y="16" width="20" height="3.4" rx="1.7" fill="#ffffff" opacity="0.9"/>
</svg>
